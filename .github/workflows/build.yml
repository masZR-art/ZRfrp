name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  desktop:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore FrpDesktop/FrpDesktop.csproj

      - name: Build
        run: dotnet build FrpDesktop/FrpDesktop.csproj -c Release --no-restore

  server:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, linux-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish server
        run: dotnet publish ZRfrp.Server/ZRfrp.Server.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -o publish/${{ matrix.rid }}
